<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14132B;
    --card:#1E1B4B;
    --card-edge:#2C2867;
    --gold:#F2B84B;
    --teal:#2DD4BF;
    --text:#F5F3FF;
    --muted:#9891C4;
    --success:#34D399;
    --rose:#FB7185;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 20% -10%, #241f5c 0%, var(--bg) 55%);
    min-height:100vh;
    font-family:'Inter',sans-serif;
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001s !important; transition-duration:0.001s !important;}
  }
  .app{
    width:100%;
    max-width:480px;
  }
  .scoreboard{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.14em;
    color:var(--muted);
    text-transform:uppercase;
  }
  .score-box{
    display:flex;
    align-items:center;
    gap:8px;
    background:#0F0E24;
    border:1px solid var(--card-edge);
    border-radius:8px;
    padding:6px 12px;
  }
  .score-label{
    font-size:10px;
    letter-spacing:0.1em;
    color:var(--muted);
    text-transform:uppercase;
  }
  .score-ticker{
    font-family:'IBM Plex Mono',monospace;
    font-size:20px;
    font-weight:600;
    color:var(--gold);
    letter-spacing:0.05em;
    min-width:56px;
    text-align:right;
  }
  .digit-pop{ animation:pop 0.4s ease; }
  @keyframes pop{ 0%{transform:scale(1.35); color:var(--teal);} 100%{transform:scale(1); color:var(--gold);} }

  .track{
    position:relative;
    height:10px;
    background:#0F0E24;
    border-radius:6px;
    border:1px solid var(--card-edge);
    margin-bottom:22px;
    overflow:hidden;
  }
  .track-fill{
    position:absolute;
    inset:0;
    width:0%;
    background:linear-gradient(90deg, var(--teal), var(--gold));
    border-radius:6px;
    transition:width 0.5s cubic-bezier(.4,1.4,.6,1);
  }
  .ticks{
    position:absolute; inset:0;
    display:flex;
  }
  .tick{
    flex:1;
    border-right:1px solid rgba(20,19,43,0.6);
  }
  .tick:last-child{border-right:none;}

  .card{
    background:linear-gradient(180deg, var(--card), #191650);
    border:1px solid var(--card-edge);
    border-radius:18px;
    padding:28px 26px 24px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,0.6);
    position:relative;
    min-height:340px;
    display:flex;
    flex-direction:column;
  }
  .q-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.12em;
    color:var(--teal);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .q-prompt{
    font-family:'Space Grotesk',sans-serif;
    font-size:22px;
    font-weight:600;
    line-height:1.3;
    margin:0 0 20px;
  }
  .award-chip{
    display:inline-block;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:0.92em;
    padding:3px 12px;
    margin:0 2px;
    border-radius:999px;
    background:linear-gradient(135deg, var(--gold), #ffe08a);
    color:#3a2a00;
    box-shadow:0 2px 0 rgba(0,0,0,0.15);
    transform:rotate(-2deg);
    white-space:nowrap;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:auto;
  }
  .opt-row{
    display:flex;
    gap:8px;
  }
  .opt-btn{
    flex:1;
    background:#171448;
    border:1px solid var(--card-edge);
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:500;
    padding:13px 10px;
    border-radius:10px;
    cursor:pointer;
    transition:transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    text-align:center;
  }
  .opt-btn:hover{ border-color:var(--teal); transform:translateY(-2px); }
  .opt-btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .opt-btn.chosen{ background:var(--teal); color:#0F0E24; border-color:var(--teal); }
  .opt-btn.scale{ font-family:'IBM Plex Mono',monospace; font-size:16px; padding:14px 0; }

  .emoji-row{ flex-direction:row; gap:8px; }
  .emoji-row .opt-btn{ font-size:26px; padding:12px 0; }

  .match-grid{
    display:flex;
    gap:10px;
    margin-bottom:auto;
  }
  .match-col{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .match-chip{
    font-size:13px;
    line-height:1.3;
    padding:12px 10px;
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
  }
  .match-chip.selected{ border-color:var(--gold); box-shadow:0 0 0 2px rgba(242,184,75,0.3); }
  .match-chip.matched{ background:rgba(52,211,153,0.18); border-color:var(--success); color:var(--success); cursor:default; }
  .match-chip.wrong{ background:rgba(251,113,133,0.18); border-color:var(--rose); }

  textarea{
    width:100%;
    background:#171448;
    border:1px solid var(--card-edge);
    color:var(--text);
    border-radius:10px;
    padding:12px 14px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    resize:none;
    min-height:96px;
    margin-bottom:auto;
  }
  textarea:focus-visible{ outline:2px solid var(--gold); outline-offset:1px; }
  textarea::placeholder{ color:var(--muted); }

  .hint{
    font-size:12px;
    color:var(--muted);
    margin-top:8px;
  }

  .feedback-toast{
    font-size:13px;
    font-weight:600;
    color:var(--success);
    min-height:18px;
    margin-top:14px;
    opacity:0;
    transform:translateY(4px);
    transition:opacity 0.25s ease, transform 0.25s ease;
  }
  .feedback-toast.show{ opacity:1; transform:translateY(0); }

  .footer-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:18px;
  }
  .skip-link{
    background:none;
    border:none;
    color:var(--muted);
    font-size:13px;
    cursor:pointer;
    text-decoration:underline;
  }
  .next-btn{
    background:var(--gold);
    color:#1a1533;
    border:none;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:14px;
    padding:12px 22px;
    border-radius:10px;
    cursor:pointer;
    letter-spacing:0.02em;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow:0 8px 20px -8px rgba(242,184,75,0.6);
  }
  .next-btn:disabled{ opacity:0.35; cursor:not-allowed; box-shadow:none; }
  .next-btn:not(:disabled):hover{ transform:translateY(-2px); }

  .streak-chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--gold);
    background:rgba(242,184,75,0.1);
    border:1px solid rgba(242,184,75,0.3);
    padding:3px 9px;
    border-radius:20px;
    display:none;
    align-items:center;
    gap:4px;
  }
  .streak-chip.on{ display:inline-flex; }

  /* Result screen */
  .result{ text-align:center; }
  .badge-wrap{
    display:flex; justify-content:center; margin:6px 0 16px;
  }
  .badge-medal{
    width:96px; height:96px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:44px;
    background:radial-gradient(circle at 35% 30%, #FFE7B3, var(--gold) 60%, #B9852B 100%);
    box-shadow:0 0 0 6px rgba(242,184,75,0.12), 0 20px 40px -14px rgba(242,184,75,0.6);
    animation:badge-in 0.6s cubic-bezier(.2,1.6,.4,1);
  }
  @keyframes badge-in{ 0%{transform:scale(0) rotate(-25deg); opacity:0;} 100%{transform:scale(1) rotate(0); opacity:1;} }
  .badge-title{ font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; margin:4px 0 2px; }
  .badge-sub{ color:var(--muted); font-size:13px; margin-bottom:20px; }
  .final-score{
    font-family:'IBM Plex Mono',monospace;
    font-size:38px;
    color:var(--gold);
    font-weight:600;
    margin-bottom:4px;
  }
  .final-label{ font-size:11px; letter-spacing:0.12em; color:var(--muted); text-transform:uppercase; margin-bottom:22px; }

  .contact-field{
    width:100%;
    background:#171448;
    border:1px solid var(--card-edge);
    color:var(--text);
    border-radius:10px;
    padding:12px 14px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    margin-bottom:10px;
  }
  .contact-field::placeholder{ color:var(--muted); }

  .submit-btn{
    width:100%;
    background:linear-gradient(90deg, var(--teal), #23b0a0);
    color:#0F0E24;
    border:none;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    padding:14px 0;
    border-radius:10px;
    cursor:pointer;
    margin-top:6px;
  }
  .submit-btn:disabled{ opacity:0.5; cursor:not-allowed; }

  .thanks-note{
    font-size:12px;
    color:var(--muted);
    margin-top:14px;
  }

  .confetti{
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    pointer-events:none;
    overflow:hidden;
    z-index:5;
  }
  .confetti span{
    position:absolute;
    top:-10px;
    width:8px; height:14px;
    opacity:0.9;
    animation:fall linear forwards;
    border-radius:2px;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(540deg); opacity:0.2; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="scoreboard">
    <div class="brand">Feedback Arcade</div>
  </div>

  <div class="track">
    <div class="track-fill" id="trackFill"></div>
    <div class="ticks" id="ticks"></div>
  </div>

  <div class="card" id="card"></div>
</div>

<script>
const CONFIG = {
  // Paste the "HTTP POST URL" from your Power Automate flow's
  // "When an HTTP request is received" trigger here. See README.md.
  POWER_AUTOMATE_URL: "https://default18a59a81eea84c30948ad8824cdc25.80.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/32bfed546f314a82a7582c0a8fb68fd7/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=-Cme0mPjj6bWf0kSH9OegU0-Y-OZ3qU35OawuSB8rcw"
};

const QUESTIONS = [
  {
    id: "experience",
    eyebrow: "Round 1 of 6 · Learning Pulse",
    prompt: "How much did today's sessions boost your understanding of what these functions do?",
    type: "emoji-scale",
    options: [
      {label:"😞", value:1, points:6},
      {label:"🙁", value:2, points:8},
      {label:"😐", value:3, points:10},
      {label:"🙂", value:4, points:14},
      {label:"🤩", value:5, points:18}
    ],
    feedback: {
      1:"Ouch — thanks for the honesty.",
      2:"Noted. That helps us fix it.",
      3:"Fair enough, room to grow!",
      4:"Nice! Glad it landed.",
      5:"Legendary. High five! ✋"
    }
  },
  {
    id: "match",
    eyebrow: "Round 2 of 6 · Match Round",
    prompt: "Match each function to what they actually do.",
    type: "match",
    hint: "Tap a function, then tap its matching description.",
    // Edit these four descriptions to match what was actually presented at your event.
    pairs: [
      { id:"tech", function:"Tech@Lilly", description:"Builds and maintains the technology platforms and digital tools that power Lilly's work." },
      { id:"commercial", function:"Commercial", description:"Brings Lilly's medicines to patients and doctors through sales, marketing, and market access." },
      { id:"lrl", function:"LRL", description:"Discovers and develops new medicines through scientific research." },
      { id:"site", function:"Site Team", description:"Keeps the physical campus, facilities, and day-to-day site operations running smoothly." }
    ]
  },
  {
    id: "innovation",
    eyebrow: "Round 3 of 6 · 🚀 Innovation Icon",
    prompt: "🎬 Drumroll please... who's taking home the <span class=\"award-chip\">🧠 Big Brain of the Year</span> award — for the function that made you go \"wait, THAT'S clever\"?",
    type: "choice",
    layout: "grid",
    options: [
      {label:"Tech@Lilly", value:"tech", points:14},
      {label:"Commercial", value:"commercial", points:14},
      {label:"LRL", value:"lrl", points:14},
      {label:"Site Team", value:"site", points:14}
    ],
    feedback: { _default: "Vote counted — filed away! 📌" }
  },
  {
    id: "energy",
    eyebrow: "Round 4 of 6 · 🔥 Most Electric Energy",
    prompt: "⚡ Who's plugging in for the <span class=\"award-chip\">🔌 Most Electric Vibes</span> trophy — the function that had the room buzzing loudest today?",
    type: "choice",
    layout: "grid",
    options: [
      {label:"Tech@Lilly", value:"tech", points:14},
      {label:"Commercial", value:"commercial", points:14},
      {label:"LRL", value:"lrl", points:14},
      {label:"Site Team", value:"site", points:14}
    ],
    feedback: { _default: "Vote counted — filed away! 📌" }
  },
  {
    id: "nps",
    eyebrow: "Round 5 of 6 · Applied Learning",
    prompt: "How likely are you to actually use something you learned today in your day-to-day role?",
    type: "scale-11",
    hint: "0 = not likely · 10 = extremely likely",
    feedback: { low:"Thanks — we've got work to do.", mid:"Appreciate the honest middle ground.", high:"Amazing — you just made our day! 🎉" }
  },
  {
    id: "improve",
    eyebrow: "Final Round · Bonus points for detail",
    prompt: "What's one idea, fact, or moment from today that's sticking with you?",
    type: "text",
    placeholder: "Type your thoughts here...",
    optional: true,
    maxPoints: 20
  }
];

const MAX_SCORE = 18 + 20 + 14 + 14 + 20 + 20; // best-case total across all rounds (match round max = 20)

let state = {
  index: 0,
  score: 0,
  streak: 0,
  answers: {}
};

const cardEl = document.getElementById('card');
const trackFill = document.getElementById('trackFill');
const ticksEl = document.getElementById('ticks');

function buildTicks(){
  ticksEl.innerHTML = "";
  for(let i=0;i<QUESTIONS.length;i++){
    const t = document.createElement('div');
    t.className = 'tick';
    ticksEl.appendChild(t);
  }
}
buildTicks();

function updateScore(newScore){
  state.score = newScore;
}

function updateProgress(){
  const pct = (state.index / QUESTIONS.length) * 100;
  trackFill.style.width = pct + "%";
}

function shuffleArray(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function npsBand(v){
  if(v <= 5) return 'low';
  if(v <= 8) return 'mid';
  return 'high';
}

function renderQuestion(q){
  updateProgress();
  let html = `<div class="q-eyebrow">${q.eyebrow}</div><div class="q-prompt">${q.prompt}</div>`;

  if(q.type === "emoji-scale"){
    html += `<div class="options emoji-row" id="optWrap">`;
    q.options.forEach(o=>{
      html += `<button class="opt-btn" data-val="${o.value}" data-points="${o.points}">${o.label}</button>`;
    });
    html += `</div>`;
  } else if(q.type === "choice"){
    html += `<div class="options" id="optWrap">`;
    q.options.forEach(o=>{
      html += `<button class="opt-btn" data-val="${o.value}" data-points="${o.points}" style="text-align:left">${o.label}</button>`;
    });
    html += `</div>`;
  } else if(q.type === "scale-11"){
    html += `<div class="options" id="optWrap">`;
    html += `<div class="opt-row">`;
    for(let i=0;i<=5;i++) html += `<button class="opt-btn scale" data-val="${i}">${i}</button>`;
    html += `</div><div class="opt-row">`;
    for(let i=6;i<=10;i++) html += `<button class="opt-btn scale" data-val="${i}">${i}</button>`;
    html += `</div></div>`;
    if(q.hint) html += `<div class="hint">${q.hint}</div>`;
  } else if(q.type === "text"){
    html += `<textarea id="textInput" placeholder="${q.placeholder||''}"></textarea>`;
    html += `<div class="hint">More detail = more points. ${q.optional ? "This one's optional." : ""}</div>`;
  } else if(q.type === "match"){
    const shuffledDescriptions = shuffleArray(q.pairs.map(p => ({id:p.id, text:p.description})));
    html += `<div class="match-grid" id="optWrap">
      <div class="match-col">
        ${q.pairs.map(p => `<button class="opt-btn match-chip" data-id="${p.id}" data-role="function">${p.function}</button>`).join('')}
      </div>
      <div class="match-col">
        ${shuffledDescriptions.map(d => `<button class="opt-btn match-chip match-desc" data-id="${d.id}" data-role="description">${d.text}</button>`).join('')}
      </div>
    </div>`;
    if(q.hint) html += `<div class="hint">${q.hint}</div>`;
  }

  html += `<div class="feedback-toast" id="toast"></div>`;
  html += `<div class="footer-row">`;
  html += q.optional ? `<button class="skip-link" id="skipBtn">Skip this one</button>` : `<span class="streak-chip ${state.streak>1?'on':''}" id="streakChip">🔥 ${state.streak}x streak</span>`;
  html += `<button class="next-btn" id="nextBtn" disabled>Next →</button>`;
  html += `</div>`;

  cardEl.innerHTML = html;
  wireUp(q);
}

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  requestAnimationFrame(()=> toast.classList.add('show'));
}

function wireUp(q){
  const nextBtn = document.getElementById('nextBtn');
  let currentPoints = 0;
  let answerValue = null;

  if(q.type === "emoji-scale" || q.type === "choice" || q.type === "scale-11"){
    const buttons = cardEl.querySelectorAll('.opt-btn');
    buttons.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        buttons.forEach(b=>b.classList.remove('chosen'));
        btn.classList.add('chosen');
        answerValue = btn.dataset.val;

        if(q.type === "scale-11"){
          const v = parseInt(answerValue,10);
          const band = npsBand(v);
          currentPoints = 4 + v * 1.6;
          showToast(q.feedback[band]);
        } else {
          currentPoints = parseFloat(btn.dataset.points || 10);
          const msg = q.feedback[answerValue] || q.feedback[parseInt(answerValue,10)] || q.feedback._default;
          showToast(msg);
        }
        nextBtn.disabled = false;
      });
    });
  }

  if(q.type === "text"){
    const ta = document.getElementById('textInput');
    ta.addEventListener('input', ()=>{
      const words = ta.value.trim().split(/\s+/).filter(Boolean).length;
      currentPoints = Math.min(q.maxPoints, words * 1.6);
      answerValue = ta.value.trim();
      if(words >= 8){ showToast("That's the good stuff — thank you! 🙌"); }
      else if(words >= 3){ showToast("Nice, a little more detail helps even more."); }
      else { document.getElementById('toast').classList.remove('show'); }
      nextBtn.disabled = words === 0;
    });
    const skipBtn = document.getElementById('skipBtn');
    if(skipBtn){
      skipBtn.addEventListener('click', ()=>{
        answerValue = "";
        currentPoints = 0;
        advance(q, answerValue, currentPoints);
      });
    }
  }

  if(q.type === "match"){
    let selectedFnId = null;
    let matchedCount = 0;
    const attemptedWrong = new Set();
    const totalPairs = q.pairs.length;
    const perPairPoints = 20 / totalPairs;
    let totalPoints = 0;

    const fnButtons = cardEl.querySelectorAll('[data-role="function"]');
    const descButtons = cardEl.querySelectorAll('[data-role="description"]');

    fnButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        if(btn.classList.contains('matched')) return;
        fnButtons.forEach(b => b.classList.remove('selected'));
        if(selectedFnId === btn.dataset.id){
          selectedFnId = null;
        } else {
          selectedFnId = btn.dataset.id;
          btn.classList.add('selected');
        }
      });
    });

    descButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        if(btn.classList.contains('matched') || !selectedFnId) return;
        const fnBtn = cardEl.querySelector(`[data-role="function"][data-id="${selectedFnId}"]`);

        if(btn.dataset.id === selectedFnId){
          btn.classList.add('matched');
          fnBtn.classList.add('matched');
          fnBtn.classList.remove('selected');
          const pts = attemptedWrong.has(selectedFnId) ? Math.round(perPairPoints * 0.4) : perPairPoints;
          totalPoints += pts;
          matchedCount++;
          selectedFnId = null;

          if(matchedCount === totalPairs){
            showToast("Nailed the lineup! 🎯");
            currentPoints = totalPoints;
            answerValue = `${matchedCount}/${totalPairs} matched correctly`;
            nextBtn.disabled = false;
          } else {
            showToast("Matched! Keep going.");
          }
        } else {
          attemptedWrong.add(selectedFnId);
          btn.classList.add('wrong');
          fnBtn.classList.add('wrong');
          setTimeout(()=>{
            btn.classList.remove('wrong');
            fnBtn.classList.remove('wrong');
          }, 500);
        }
      });
    });
  }

  nextBtn.addEventListener('click', ()=>{
    advance(q, answerValue, currentPoints);
  });
}

function advance(q, answerValue, points){
  state.answers[q.id] = answerValue;
  updateScore(state.score + points);
  state.streak = points > 0 ? state.streak + 1 : 0;
  state.index += 1;

  if(state.index < QUESTIONS.length){
    renderQuestion(QUESTIONS[state.index]);
  } else {
    updateProgress();
    renderResult();
  }
}

function getBadge(pct){
  if(pct >= 90) return {title:"Feedback Legend", medal:"🏆", sub:"Top-tier detail and honesty."};
  if(pct >= 70) return {title:"Feedback Champion", medal:"🥇", sub:"Thorough and thoughtful — nice work."};
  if(pct >= 40) return {title:"Feedback Pro", medal:"🥈", sub:"Solid input, thank you for playing."};
  return {title:"Feedback Rookie", medal:"🥉", sub:"Every response counts — thanks for jumping in."};
}

function renderResult(){
  const pct = Math.min(100, Math.round((state.score / MAX_SCORE) * 100));
  const badge = getBadge(pct);

  cardEl.innerHTML = `
    <div class="result">
      <div class="badge-wrap"><div class="badge-medal">${badge.medal}</div></div>
      <div class="badge-title">${badge.title}</div>
      <div class="badge-sub">${badge.sub}</div>
      <input class="contact-field" id="nameField" placeholder="Your name (optional)" autocomplete="off">
      <button class="submit-btn" id="submitBtn">Submit my feedback</button>
      <div class="thanks-note" id="thanksNote">Your answers stay private and are only used to improve things.</div>
    </div>
  `;
  fireConfetti();

  document.getElementById('submitBtn').addEventListener('click', submitResponse);
}

function submitResponse(){
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = "Sending...";

  const payload = {
    timestamp: new Date().toISOString(),
    name: document.getElementById('nameField').value || "",
    ...state.answers
  };

  const notConfigured = !CONFIG.POWER_AUTOMATE_URL || CONFIG.POWER_AUTOMATE_URL.includes("PASTE_YOUR");

  if(notConfigured){
    // Demo mode: no real flow wired up yet. Show what WOULD be sent so you
    // can see the payload shape, instead of silently failing. See README.md.
    submitBtn.disabled = true;
    submitBtn.textContent = "Demo mode — no flow connected yet";
    const preview = Object.entries(payload)
      .map(([k, v]) => `<div style="display:flex;justify-content:space-between;gap:10px;padding:4px 0;border-bottom:1px solid var(--card-edge)"><span style="color:var(--muted)">${k}</span><span style="text-align:right;max-width:60%;word-break:break-word">${v === "" ? "—" : v}</span></div>`)
      .join("");
    document.getElementById('thanksNote').innerHTML = `
      <div style="text-align:left;margin-top:10px;font-size:12px">
        <div style="color:var(--teal);font-weight:600;margin-bottom:6px">This is the payload that would be POSTed to Power Automate:</div>
        ${preview}
        <div style="margin-top:10px">Add your flow's HTTP trigger URL to <code>CONFIG.POWER_AUTOMATE_URL</code> to go live — see README.md.</div>
      </div>
    `;
    return;
  }

  // This endpoint accepts normal cross-origin JSON POSTs fine, so we can
  // read the real response instead of guessing (no no-cors workaround needed).
  // If the first attempt fails (a hiccup during a live event, a brief
  // network blip, etc.), we automatically retry once before giving up.
  submitWithRetry();

  function submitWithRetry(isRetry){
    fetch(CONFIG.POWER_AUTOMATE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(res => {
      if(res.ok){
        finishSubmit(true);
      } else if(!isRetry){
        submitBtn.textContent = "Retrying...";
        setTimeout(() => submitWithRetry(true), 1200);
      } else {
        finishSubmit(false);
      }
    })
    .catch(() => {
      if(!isRetry){
        submitBtn.textContent = "Retrying...";
        setTimeout(() => submitWithRetry(true), 1200);
      } else {
        finishSubmit(false);
      }
    });
  }

  function finishSubmit(ok){
    submitBtn.textContent = ok === false ? "Sent, but couldn't confirm — thank you!" : "Thanks — feedback sent! ✅";
    document.getElementById('thanksNote').textContent = "You can close this tab. We appreciate you!";
  }
}

function fireConfetti(){
  const colors = ["#F2B84B","#2DD4BF","#FB7185","#F5F3FF"];
  const wrap = document.createElement('div');
  wrap.className = "confetti";
  for(let i=0;i<40;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100 + "%";
    s.style.background = colors[i % colors.length];
    s.style.animationDuration = (2 + Math.random()*1.5) + "s";
    s.style.animationDelay = (Math.random()*0.4) + "s";
    wrap.appendChild(s);
  }
  document.body.appendChild(wrap);
  setTimeout(()=> wrap.remove(), 4000);
}

renderQuestion(QUESTIONS[0]);
</script>
